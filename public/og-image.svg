<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- AT mark -->
  <rect x="80" y="80" width="96" height="96" rx="22" fill="url(#brand)"/>
  <text x="128" y="148" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="46" font-weight="800" text-anchor="middle" fill="#0a0a0f">AT</text>

  <!-- Eyebrow -->
  <text x="80" y="320" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="600" letter-spacing="6" fill="#7c5cff">SOFTWARE ENGINEER</text>

  <!-- Name -->
  <text x="80" y="400" font-family="-apple-system, 'Geist', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" fill="#ededf0">Alex Titov</text>

  <!-- Tagline -->
  <text x="80" y="480" font-family="-apple-system, 'Geist', system-ui, sans-serif" font-size="36" font-weight="400" fill="#8a8a99">Building AI, full-stack, and cloud systems.</text>

  <!-- Footer URL -->
  <text x="80" y="560" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="500" fill="#5a5a6a">alextitov.com</text>
</svg>
