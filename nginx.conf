events {}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml font/woff2;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Cache fingerprinted assets aggressively
        location /assets/ {
            try_files $uri =404;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Research PDFs and figures: cache for a day
        location /research/ {
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public";
        }

        location = /resume.pdf {
            expires 1d;
            add_header Cache-Control "public";
        }

        # SPA: fall back to index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        error_page 404 /index.html;
    }
}
